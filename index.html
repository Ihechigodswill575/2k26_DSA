<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#128C7E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>2k26_DSA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  /* WhatsApp-inspired palette */
  --wa-green:#128C7E;
  --wa-green-light:#25D366;
  --wa-green-dark:#075E54;
  --wa-teal:#00BFA5;
  --fb-blue:#1877F2;
  --wa-bg:#ECE5DD;
  --wa-sidebar:#F0F2F5;
  --wa-white:#FFFFFF;
  --wa-msg-out:#DCF8C6;
  --wa-msg-in:#FFFFFF;
  --wa-border:#E9EDEF;
  --wa-text:#111B21;
  --wa-text2:#667781;
  --wa-text3:#8696A0;
  --wa-header:#128C7E;
  --wa-danger:#F15C6D;
  --wa-unread:#25D366;
  --radius:8px;
  --radius-sm:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--wa-bg);color:var(--wa-text);-webkit-font-smoothing:antialiased}

/* \u2550\u2550 SPLASH \u2550\u2550 */
#splash-screen{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--wa-green-dark);
  transition:opacity 0.6s ease;
}
#splash-screen.hiding{opacity:0;pointer-events:none}
.splash-logo-wrap{
  position:relative;width:120px;height:120px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
  animation:splashLogoIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes splashLogoIn{from{opacity:0;transform:scale(0.2)}to{opacity:1;transform:scale(1)}}
.splash-logo-bg{
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:3px solid rgba(255,255,255,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;
  overflow:hidden;
  animation:splashPulse 2s ease-in-out 1s infinite;
}
@keyframes splashPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.3)}50%{box-shadow:0 0 0 18px rgba(255,255,255,0)}}
.splash-logo-bg img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.splash-title{
  font-size:28px;font-weight:700;color:#fff;
  letter-spacing:2px;
  animation:splashFadeUp 0.6s ease 0.8s both;
}
.splash-sub{
  font-size:13px;color:rgba(255,255,255,0.65);
  margin-top:5px;letter-spacing:0.5px;
  animation:splashFadeUp 0.6s ease 1s both;
}
.splash-bar-wrap{
  width:160px;height:3px;
  background:rgba(255,255,255,0.2);
  border-radius:3px;margin-top:40px;overflow:hidden;
  animation:splashFadeUp 0.5s ease 1.2s both;
}
.splash-bar-fill{
  height:100%;width:0;border-radius:3px;
  background:#fff;
  animation:splashFill 2s cubic-bezier(0.4,0,0.2,1) 1.3s forwards;
}
@keyframes splashFill{from{width:0}to{width:100%}}
.splash-step{
  font-size:11px;color:rgba(255,255,255,0.5);
  margin-top:8px;min-height:16px;letter-spacing:0.5px;
  animation:splashFadeUp 0.5s ease 1.4s both;
}
.splash-credit{
  position:absolute;bottom:calc(28px + var(--safe-bot));
  font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  animation:splashFadeUp 0.6s ease 1.8s both;
}
@keyframes splashFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* \u2550\u2550 AUTH \u2550\u2550 */
.auth-wrap{
  position:fixed;inset:0;z-index:100;
  background:var(--wa-white);
  display:flex;align-items:flex-start;justify-content:center;
  overflow-y:auto;
  padding:0 0 calc(20px + var(--safe-bot));
  padding-top:var(--safe-top);
}
.auth-inner{width:100%;max-width:420px;display:flex;flex-direction:column}
.auth-hero{
  background:var(--wa-green-dark);
  padding:48px 28px 36px;text-align:center;
}
.auth-hero-logo{
  width:72px;height:72px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.5);
  margin:0 auto 14px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;background:rgba(255,255,255,0.15);
}
.auth-hero-logo img{width:100%;height:100%;object-fit:cover}
.auth-hero h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:1px}
.auth-hero p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:5px}
.auth-body{padding:24px 24px;background:var(--wa-white);flex:1}
.auth-tabs{
  display:flex;border-bottom:2px solid var(--wa-border);
  margin-bottom:24px;
}
.auth-tab{
  flex:1;padding:10px;text-align:center;
  font-size:14px;font-weight:600;color:var(--wa-text2);
  cursor:pointer;border-bottom:2.5px solid transparent;
  margin-bottom:-2px;transition:all 0.2s;
}
.auth-tab.active{color:var(--wa-green);border-bottom-color:var(--wa-green)}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;color:var(--wa-text2);margin-bottom:6px;font-weight:600}
.fg input{
  width:100%;padding:11px 14px;
  background:#F9FAFB;border:1.5px solid var(--wa-border);
  border-radius:var(--radius);color:var(--wa-text);
  font-family:inherit;font-size:14px;outline:none;transition:all 0.2s;
}
.fg input:focus{border-color:var(--wa-green);background:#fff;box-shadow:0 0 0 3px rgba(18,140,126,0.1)}
.fg .hint{font-size:11px;color:var(--wa-text3);margin-top:4px}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px!important}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--wa-text2);cursor:pointer;
  font-size:16px;padding:4px;display:flex;align-items:center;justify-content:center;
}
.pfp-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.pfp-circle{
  width:54px;height:54px;border-radius:50%;
  background:#F0F2F5;border:2px dashed var(--wa-border);
  cursor:pointer;overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.2s;
}
.pfp-circle:hover{border-color:var(--wa-green)}
.pfp-circle img{width:100%;height:100%;object-fit:cover}
.pfp-label{font-size:12px;color:var(--wa-green);cursor:pointer;display:block;font-weight:600}
.pfp-hint{font-size:11px;color:var(--wa-text3);margin-top:3px}
.btn-primary{
  width:100%;padding:13px;border:none;border-radius:var(--radius);
  background:var(--wa-green);color:#fff;
  font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;
  transition:all 0.2s;
}
.btn-primary:hover{background:var(--wa-green-dark)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1.5px solid var(--wa-border);color:var(--wa-text2)}
.btn-ghost:hover{border-color:var(--wa-green);color:var(--wa-green)}
.btn-danger-outline{background:transparent;border:1.5px solid var(--wa-danger);color:var(--wa-danger)}
.err-box{
  color:#D93025;font-size:12px;margin-top:8px;
  padding:9px 12px;background:#FEF7F7;
  border-radius:var(--radius-sm);border-left:3px solid #D93025;
  display:none;word-break:break-word;line-height:1.5;
}

/* \u2550\u2550 MAIN LAYOUT \u2550\u2550 */
.app-wrap{display:flex;height:100%;overflow:hidden}

/* \u2550\u2550 SIDEBAR \u2550\u2550 */
.sidebar{
  width:360px;background:var(--wa-white);
  border-right:1px solid var(--wa-border);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.sidebar.hidden{transform:translateX(-100%)}

/* Sidebar header */
.s-header{
  background:var(--wa-header);
  padding:calc(14px + var(--safe-top)) 14px 14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.s-header-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.s-header-av{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
  flex-shrink:0;overflow:hidden;cursor:pointer;
  border:2px solid rgba(255,255,255,0.4);
  transition:border-color 0.2s;
}
.s-header-av:hover{border-color:rgba(255,255,255,0.8)}
.s-header-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.s-header-title{font-size:18px;font-weight:700;color:#fff;white-space:nowrap}
.s-header-actions{display:flex;gap:6px;align-items:center}
.hdr-btn{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;
  color:rgba(255,255,255,0.85);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all 0.2s;
}
.hdr-btn:hover{background:rgba(255,255,255,0.15)}
.hdr-btn:active{transform:scale(0.9)}

/* Hamburger dropdown */
.hmenu{
  display:none;position:fixed;
  top:calc(62px + var(--safe-top));right:12px;
  background:var(--wa-white);border:none;
  border-radius:var(--radius);padding:6px 0;
  z-index:150;min-width:200px;
  box-shadow:0 4px 20px rgba(0,0,0,0.18);
  animation:popIn 0.15s ease;
}
.hmenu.show{display:block}
.hmi{
  display:flex;align-items:center;gap:14px;
  padding:11px 18px;cursor:pointer;font-size:14px;
  color:var(--wa-text);transition:background 0.12s;
}
.hmi:hover{background:#F5F5F5}
.hmi-icon{font-size:18px;width:22px;text-align:center}
.hmenu-divider{height:1px;background:var(--wa-border);margin:4px 0}

/* Status row */
.status-row{
  padding:10px 14px;border-bottom:1px solid var(--wa-border);
  display:flex;gap:14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;
  background:var(--wa-white);
}
.status-row::-webkit-scrollbar{display:none}
.st-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;transition:transform 0.15s}
.st-item:active{transform:scale(0.93)}
.st-ring{
  width:50px;height:50px;border-radius:50%;
  border:2.5px solid var(--wa-green);padding:2px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;
  background:var(--wa-white);
}
.st-ring img,.st-ring-inner{width:100%;height:100%;border-radius:50%;object-fit:cover}
.st-ring-inner{display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--wa-green);background:#F0F2F5}
.st-ring.add-ring{border-color:var(--wa-border);border-style:dashed}
.st-ring.mine-ring{border-color:var(--fb-blue)}
.st-item span{font-size:10px;color:var(--wa-text);max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;font-weight:500}

/* Search */
.s-search{padding:8px 14px;background:var(--wa-sidebar);flex-shrink:0}
.search-wrap{
  display:flex;align-items:center;background:var(--wa-white);
  border-radius:var(--radius);padding:0 12px;gap:8px;
  border:1.5px solid transparent;transition:all 0.2s;
}
.search-wrap:focus-within{border-color:rgba(18,140,126,0.3)}
.search-wrap svg{color:var(--wa-text3);width:16px;height:16px;flex-shrink:0}
.search-wrap input{flex:1;background:none;border:none;color:var(--wa-text);font-family:inherit;font-size:13px;padding:9px 0;outline:none}
.search-wrap input::placeholder{color:var(--wa-text3)}

/* Sidebar tabs */
.sidebar-tabs{
  display:flex;border-bottom:1px solid var(--wa-border);flex-shrink:0;
  background:var(--wa-white);
}
.stab{
  flex:1;padding:11px 6px;text-align:center;
  font-size:12px;font-weight:700;letter-spacing:0.5px;
  color:var(--wa-text2);cursor:pointer;
  border-bottom:2.5px solid transparent;transition:all 0.2s;
  position:relative;text-transform:uppercase;
}
.stab.active{color:var(--wa-green);border-bottom-color:var(--wa-green)}
.stab-badge{
  position:absolute;top:7px;right:calc(50% - 22px);
  background:var(--wa-unread);color:#fff;
  font-size:9px;font-weight:700;border-radius:10px;
  padding:1px 5px;min-width:15px;text-align:center;
  display:none;
}
.stab-badge.show{display:block}
.tab-pane{display:none;flex:1;overflow-y:auto;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--wa-border) transparent}
.tab-pane.active{display:flex}
.tab-pane::-webkit-scrollbar{width:3px}
.tab-pane::-webkit-scrollbar-thumb{background:var(--wa-border);border-radius:3px}

/* Chat items */
.ci{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;cursor:pointer;
  border-bottom:1px solid var(--wa-border);
  transition:background 0.12s;position:relative;
  background:var(--wa-white);
}
.ci:hover,.ci.active{background:#F5F5F5}
.ci-av{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:var(--wa-green);display:flex;align-items:center;
  justify-content:center;font-size:20px;font-weight:700;
  color:#fff;overflow:hidden;
}
.ci-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--wa-text)}
.ci-last{font-size:13px;color:var(--wa-text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ci-time{font-size:11px;color:var(--wa-text3)}
.ci-badge{background:var(--wa-unread);color:#fff;font-size:11px;font-weight:700;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:10px}
.empty-list{text-align:center;padding:40px 20px;color:var(--wa-text2);font-size:13px;line-height:1.6}
.empty-list .ei{font-size:38px;margin-bottom:8px}
.req-item{display:flex;align-items:center;gap:11px;padding:13px 14px;border-bottom:1px solid var(--wa-border);background:var(--wa-white)}
.req-info{flex:1;min-width:0}
.req-name{font-size:14px;font-weight:600;color:var(--wa-text)}
.req-user{font-size:12px;color:var(--wa-text2);margin-top:2px}
.req-actions{display:flex;gap:7px;flex-shrink:0}
.req-btn{padding:7px 14px;border-radius:20px;border:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.req-btn.accept{background:var(--wa-green);color:#fff}
.req-btn.accept:hover{background:var(--wa-green-dark)}
.req-btn.decline{background:#F0F2F5;color:var(--wa-text2)}

/* \u2550\u2550 CHAT AREA \u2550\u2550 */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--wa-bg);position:relative}
.no-chat{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--wa-text2);gap:12px;
  background:var(--wa-bg);
}
.no-chat .big{font-size:80px;opacity:0.25;animation:pulse 3s ease infinite}
.no-chat p{font-size:14px;color:var(--wa-text3)}
@keyframes pulse{0%,100%{opacity:0.2}50%{opacity:0.4}}

/* Chat header */
.ch-header{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:var(--wa-header);
  flex-shrink:0;min-height:58px;
}
.back-btn{display:none;background:none;border:none;color:rgba(255,255,255,0.85);font-size:22px;cursor:pointer;padding:4px;flex-shrink:0}
.ch-name{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-sub{font-size:11px;color:rgba(255,255,255,0.7)}
.ch-info{flex:1;min-width:0;cursor:pointer}
.ch-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;overflow:hidden;cursor:pointer}
.ch-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* Msg search bar */
.msg-search-bar{
  display:none;background:var(--wa-header);
  border-top:1px solid rgba(255,255,255,0.15);
  padding:8px 12px;align-items:center;gap:8px;flex-shrink:0;
}
.msg-search-bar.show{display:flex}
.msg-search-bar input{
  flex:1;background:rgba(255,255,255,0.15);
  border:none;border-radius:var(--radius);
  padding:7px 12px;color:#fff;font-family:inherit;font-size:13px;outline:none;
}
.msg-search-bar input::placeholder{color:rgba(255,255,255,0.5)}
.msg-search-bar button{background:none;border:none;color:rgba(255,255,255,0.8);cursor:pointer;font-size:15px;padding:4px}
.msg-search-count{font-size:11px;color:rgba(255,255,255,0.7);white-space:nowrap}
.msg-search-nav button{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.msg-search-nav{display:flex;align-items:center;gap:4px}

/* Rules banner */
.gc-rules-banner{
  background:#FFF9C4;border-bottom:1px solid #F9A825;
  padding:8px 14px;font-size:12px;color:#5D4037;
  display:none;flex-shrink:0;
}
.gc-rules-banner.show{display:block}
.gc-rules-banner strong{color:#E65100;font-weight:700}

/* Chat wallpaper pattern */
.msgs-container{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;
  scrollbar-width:thin;scrollbar-color:rgba(0,0,0,0.15) transparent;
  padding:8px 10px;gap:1px;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23128C7E' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.msgs-container::-webkit-scrollbar{width:4px}
.msgs-container::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:4px}

/* Messages */
.mw{display:flex;flex-direction:column;max-width:75%;position:relative;animation:msgIn 0.18s ease;touch-action:pan-y;transition:transform 0.15s ease;margin:1px 0}
.mw.swiping{transition:none}
.mw.out{align-self:flex-end;align-items:flex-end}
.mw.in{align-self:flex-start;align-items:flex-start}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.reply-indicator{position:absolute;left:-36px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:var(--wa-green);display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0;transition:opacity 0.2s;pointer-events:none}
.mw.in .reply-indicator{left:auto;right:-36px}
.mw.swipe-ready .reply-indicator{opacity:1}
.mb{
  padding:7px 10px 6px;
  border-radius:8px;
  font-size:14px;line-height:1.5;
  word-break:break-word;cursor:pointer;
  transition:opacity 0.15s;
  position:relative;
}
.mb:active{opacity:0.85}
.mw.out .mb{background:var(--wa-msg-out);border-bottom-right-radius:2px}
.mw.in .mb{background:var(--wa-msg-in);border-bottom-left-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,0.1)}
.mb.deleted{opacity:0.5;font-style:italic;color:var(--wa-text2);background:rgba(0,0,0,0.05)!important}
.mb.edited::after{content:' (edited)';font-size:10px;color:var(--wa-text3);font-style:italic}
.msg-tail-out{position:absolute;bottom:0;right:-7px;width:0;height:0;border-style:solid;border-width:0 0 10px 10px;border-color:transparent transparent transparent var(--wa-msg-out)}
.msg-tail-in{position:absolute;bottom:0;left:-7px;width:0;height:0;border-style:solid;border-width:0 10px 10px 0;border-color:transparent var(--wa-msg-in) transparent transparent}
.m-time{font-size:10px;color:var(--wa-text3);margin-top:2px;padding:0 4px;display:flex;align-items:center;gap:3px;justify-content:flex-end}
.m-sender{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--wa-green)}
.m-img{max-width:240px;border-radius:6px;cursor:pointer;display:block}
.m-audio audio{width:220px;border-radius:24px;outline:none;height:36px}
.m-reactions{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.rpill{
  background:var(--wa-white);border:1px solid var(--wa-border);
  border-radius:20px;padding:2px 7px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:3px;transition:all 0.12s;
  box-shadow:0 1px 2px rgba(0,0,0,0.08);
}
.rpill:hover{border-color:var(--wa-green);transform:scale(1.06)}
.rpill.mine{border-color:var(--wa-green);background:#E8F5E9}
.rpill .rc{font-size:10px;color:var(--wa-text2);font-weight:600}
.tag-highlight{color:var(--wa-green);font-weight:600}
.reply-bubble{
  background:rgba(18,140,126,0.08);
  border-left:3px solid var(--wa-green);
  border-radius:4px;padding:4px 8px;
  margin-bottom:4px;font-size:12px;color:var(--wa-text2);
  cursor:pointer;max-width:100%;
}
.reply-bubble strong{color:var(--wa-green);font-size:11px;display:block;margin-bottom:1px}
.msg-highlight{background:rgba(255,214,0,0.35)!important;outline:2px solid #FFAB00!important;border-radius:4px}
.msg-highlight-current{background:rgba(255,152,0,0.45)!important;outline:2px solid #FF6F00!important;border-radius:4px}

/* Reply bar */
.reply-bar{
  display:none;background:var(--wa-white);
  border-left:4px solid var(--wa-green);
  padding:8px 14px;font-size:12px;color:var(--wa-text2);
  align-items:center;gap:9px;flex-shrink:0;
  border-top:1px solid var(--wa-border);
}
.reply-bar.show{display:flex}
.reply-bar-name{color:var(--wa-green);font-size:11px;font-weight:700;display:block;margin-bottom:2px}
.reply-bar-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;flex:1}
.reply-bar button{background:none;border:none;color:var(--wa-text3);cursor:pointer;font-size:18px;flex-shrink:0}
.edit-bar{
  display:none;background:#FFF3E0;
  border-top:1px solid #FFE0B2;
  padding:8px 14px;font-size:12px;color:#E65100;
  align-items:center;gap:9px;flex-shrink:0;
}
.edit-bar.show{display:flex}
.edit-bar span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edit-bar button{background:none;border:none;color:var(--wa-text3);cursor:pointer;font-size:17px}
.edit-timer{display:none!important}

/* Input area */
.chat-input-area{
  padding:8px 10px;padding-bottom:calc(8px + var(--safe-bot));
  background:var(--wa-sidebar);border-top:1px solid var(--wa-border);
  display:flex;align-items:flex-end;gap:8px;flex-shrink:0;
}
.iw{
  flex:1;background:var(--wa-white);
  border-radius:24px;padding:8px 14px;
  display:flex;align-items:flex-end;gap:8px;
  min-height:44px;border:none;
  box-shadow:0 1px 2px rgba(0,0,0,0.1);
}
.iw textarea{
  flex:1;background:none;border:none;color:var(--wa-text);
  font-family:inherit;font-size:14px;resize:none;outline:none;
  max-height:120px;line-height:1.5;min-height:22px;
}
.iw textarea::placeholder{color:var(--wa-text3)}
.iw-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.attach-btn{background:none;border:none;color:var(--wa-text3);cursor:pointer;font-size:20px;padding:2px;transition:color 0.2s}
.attach-btn:hover{color:var(--wa-green)}
.send-btn{
  width:46px;height:46px;border-radius:50%;border:none;flex-shrink:0;
  background:var(--wa-green);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all 0.2s;
  box-shadow:0 2px 8px rgba(18,140,126,0.35);
}
.send-btn:hover{background:var(--wa-green-dark);transform:scale(1.05)}
.send-btn:active{transform:scale(0.92)}
.mic-btn{
  width:46px;height:46px;border-radius:50%;border:none;flex-shrink:0;
  background:var(--wa-green);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all 0.2s;
  box-shadow:0 2px 8px rgba(18,140,126,0.35);
}
.mic-btn:hover{background:var(--wa-green-dark)}
.vn-bar{
  display:none;align-items:center;gap:9px;flex:1;
  background:var(--wa-white);border-radius:24px;padding:8px 14px;
  box-shadow:0 1px 2px rgba(0,0,0,0.1);
}
.vn-bar.show{display:flex}
.rec-dot{width:10px;height:10px;border-radius:50%;background:var(--wa-danger);animation:pulse 1s infinite;flex-shrink:0}
.rec-time{font-size:14px;font-weight:600;flex:1;color:var(--wa-text)}
.rec-cancel{background:none;border:none;color:var(--wa-text2);cursor:pointer;font-size:20px}
